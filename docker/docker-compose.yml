x-base-config: &base-config
  volumes:
    - ./:/workspace
    - huggingface_cache:/root/.cache/huggingface
    - ./output_audio:/workspace/output_audio
    - uv_cache:/root/.cache/uv
    - pip_cache:/root/.cache/pip
  env_file:
    - path: .env
      required: false
  environment:
    - HF_HOME=${HF_HOME:-/root/.cache/huggingface}
    - PYTHONUNBUFFERED=1
  stdin_open: true
  tty: true

services:
  # ========================================================
  # Serve Profile (LMDeploy API Server)
  # ========================================================
  serve:
    profiles: ["serve"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.serve
    container_name: vieneu-tts-serve
    ports:
      - "${SERVE_PORT:-23333}:23333"
    environment:
      - HF_HOME=${HF_HOME:-/root/.cache/huggingface}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - PYTHONUNBUFFERED=1
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    command:
      - "--model"
      - "${MODEL:-pnnbao-ump/VieNeu-TTS-v2}"
      - "--model-name"
      - "${MODEL_NAME:-pnnbao-ump/VieNeu-TTS-v2}"
      - "--port"
      - "23333"
      - "--tp"
      - "1"
      - "--memory-util"
      - "${MEMORY_UTIL:-0.5}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    restart: unless-stopped

  # ========================================================
  # API Profile — REST endpoints for n8n / Oasis
  # VIENEU_MODE controls the backend:
  #   fast     (default) : LMDeploy in-process, GPU required
  #   standard           : GGUF on CPU, no GPU needed
  #   remote             : delegates to the 'serve' container
  # Usage (GPU):  --profile api
  # Usage (CPU):  VIENEU_MODE=standard --profile api
  # ========================================================
  api:
    profiles: ["api"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.serve
    container_name: vieneu-tts-api
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      - HF_HOME=${HF_HOME:-/root/.cache/huggingface}
      - VIENEU_MODE=${VIENEU_MODE:-fast}
      - MODEL_NAME=${MODEL_NAME:-pnnbao-ump/VieNeu-TTS-v2}
      - LMDEPLOY_URL=${LMDEPLOY_URL:-http://vieneu-tts-serve:23333/v1}
      - MEMORY_UTIL=${MEMORY_UTIL:-0.5}
      - GPU_DEVICE=${GPU_DEVICE:-cuda:0}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - API_HOST=0.0.0.0
      - API_PORT=8080
      - PYTHONUNBUFFERED=1
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    entrypoint: ["uv", "run", "python", "apps/api_proxy.py"]
    command: []
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    restart: unless-stopped

  # ========================================================
  # GPU Profile (Gradio App)
  # ========================================================
  gpu:
    <<: *base-config
    profiles: ["gpu"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
      target: dev
    container_name: vieneu-tts-gpu-dev
    environment:
      - PORT=${PORT:-7860}
      - GRADIO_SERVER_PORT=${GRADIO_SERVER_PORT:-7860}
      - GRADIO_SERVER_NAME=${GRADIO_SERVER_NAME:-0.0.0.0}
      - GRADIO_SHARE=${GRADIO_SHARE:-0}
      - PHONEMIZER_ESPEAK_LIBRARY=/usr/lib/x86_64-linux-gnu/libespeak-ng.so.1
    ports:
      - "${PORT:-7860}:${GRADIO_SERVER_PORT:-7860}"
    command: ["uv", "run", "apps/gradio_main.py"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  huggingface_cache:
  uv_cache:
  pip_cache: